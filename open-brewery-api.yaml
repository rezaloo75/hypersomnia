openapi: 3.1.0
info:
  title: Open Brewery DB
  version: 1.0.0
  description: |
    The Open Brewery DB API provides information about breweries, cideries, meaderies, and brewpubs.
    This API allows you to search for breweries, retrieve details about specific breweries, and explore brewery data.
  contact:
    name: Open Brewery DB Support
    url: https://www.openbrewerydb.org

servers:
  - url: https://api.openbrewerydb.org/v1
    description: Main Open Brewery DB API server

tags:
  - name: Breweries
    description: Operations related to breweries

paths:
  /breweries:
    get:
      summary: List breweries
      description: Retrieve a list of breweries with optional filtering and pagination.
      operationId: listBreweries
      tags: [Breweries]
      parameters:
        - name: page
          in: query
          description: Page number to retrieve
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of breweries to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: by_name
          in: query
          schema:
            type: string
          description: Filter breweries by name
        - name: by_city
          in: query
          schema:
            type: string
          description: Filter breweries by city
        - name: by_state
          in: query
          schema:
            type: string
          description: Filter breweries by state (full state name required)
        - name: by_postal
          in: query
          schema:
            type: string
          description: Filter breweries by postal code (5-digit or postal+4)
        - name: by_type
          in: query
          schema:
            $ref: '#/components/schemas/BreweryType'
          description: Filter breweries by brewery type
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brewery'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /breweries/{id}:
    get:
      summary: Get brewery by ID
      description: Retrieve a specific brewery by its ID.
      operationId: getBreweryById
      tags: [Breweries]
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the brewery to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brewery'
        '404':
          description: Brewery not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /breweries/random:
    get:
      summary: Get random breweries
      description: Retrieve one or more random breweries.
      operationId: getRandomBreweries
      tags: [Breweries]
      parameters:
        - name: size
          in: query
          description: Number of breweries to return (1–50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Brewery'
                  - type: array
                    items:
                      $ref: '#/components/schemas/Brewery'
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    BreweryType:
      type: string
      enum:
        - micro
        - nano
        - regional
        - brewpub
        - large
        - planning
        - bar
        - contract
        - proprietor
        - closed

    Brewery:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier of the brewery
        name:
          type: string
          description: Name of the brewery
        brewery_type:
          $ref: '#/components/schemas/BreweryType'
        street:
          type: [string, "null"]
          description: Street address (deprecated; prefer address_1)
        address_1:
          type: [string, "null"]
          description: Primary street address
        address_2:
          type: [string, "null"]
          description: Secondary address line
        address_3:
          type: [string, "null"]
          description: Third address line
        city:
          type: string
        state:
          type: [string, "null"]
          description: State abbreviation or name (deprecated)
        state_province:
          type: [string, "null"]
          description: State or province
        county_province:
          type: [string, "null"]
        postal_code:
          type: string
        country:
          type: string
        longitude:
          type: [number, "null"]
        latitude:
          type: [number, "null"]
        phone:
          type: [string, "null"]
        website_url:
          type: [string, "null"]
          format: uri
        updated_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: [string, "null"]
          format: date-time
      required:
        - id
        - name
        - brewery_type
        - city
        - postal_code
        - country

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
      example:
        code: NOT_FOUND
        message: Not found